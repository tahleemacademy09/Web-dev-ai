name: AI Website Builder

on:
  push:
    branches: ["main"]
    paths:
      - "prompt.txt"

permissions:
  contents: write

jobs:
  build-website:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Build Website from Prompt
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'PYEOF'
          import os, subprocess, requests

          api_key = os.environ["GROQ_API_KEY"]
          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]

          prompt = open("prompt.txt").read()
          print("Building website for:", prompt[:100])

          instruction = (
              "You are a web developer. Based on the following description, "
              "generate a complete single HTML file with embedded CSS and JavaScript. "
              "Return ONLY the raw HTML code starting with <!DOCTYPE html>. "
              "No explanation, no markdown, no code blocks.\n\n"
              "Description: " + prompt
          )

          resp = requests.post(
              "https://api.groq.com/openai/v1/chat/completions",
              headers={"Authorization": "Bearer " + api_key, "Content-Type": "application/json"},
              json={"model": "llama-3.3-70b-versatile", "messages": [{"role": "user", "content": instruction}], "max_tokens": 4000}
          )
          data = resp.json()
          if "choices" not in data:
              print("Error:", data)
              exit(1)

          html = data["choices"][0]["message"]["content"].strip()
          if html.startswith("```"):
              html = html.split("```")[1]
              if html.startswith("html"):
                  html = html[4:]

          with open("index.html", "w") as f:
              f.write(html)
          print("index.html generated!")

          subprocess.run(["git", "config", "--global", "user.name", "github-actions"])
          subprocess.run(["git", "config", "--global", "user.email", "actions@github.com"])
          subprocess.run(["git", "add", "index.html"])
          subprocess.run(["git", "commit", "-m", "AI generated website"])
          subprocess.run(["git", "push"])
          print("Done!")
          PYEOF
