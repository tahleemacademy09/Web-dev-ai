name: AI Code Reviewer

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run AI Reviewer
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'PYEOF'
          import os, subprocess, requests, json

          api_key = os.environ["GROQ_API_KEY"]
          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]

          result = subprocess.run(["git","show","--name-only","--format=","HEAD"], capture_output=True, text=True)
          all_files = result.stdout.strip().splitlines()
          files = [f for f in all_files if f.endswith((".py",".js",".ts")) and os.path.isfile(f)]

          if not files:
              print("No files to review")
              exit(0)

          body = "## AI Code Review\n"
          for path in files:
              code = open(path).read()[:6000]
              prompt = "Review this code for bugs and improvements. Be concise.\n\n" + path + ":\n" + code
              resp = requests.post(
                  "https://api.groq.com/openai/v1/chat/completions",
                  headers={"Authorization": "Bearer " + api_key, "Content-Type": "application/json"},
                  json={"model": "llama3-8b-8192", "messages": [{"role": "user", "content": prompt}], "max_tokens": 800}
              )
              review = resp.json()["choices"][0]["message"]["content"]
              body += "\n### " + path + "\n" + review + "\n"

          sha = subprocess.run(["git","rev-parse","HEAD"], capture_output=True, text=True).stdout.strip()
          url = "https://api.github.com/repos/" + repo + "/commits/" + sha + "/comments"
          requests.post(url, json={"body": body}, headers={"Authorization":"Bearer "+token,"Accept":"application/vnd.github+json"}).raise_for_status()
          print("Done!")
          PYEOF
          result = subprocess.run(["git","show","--name-only","--format=","HEAD"], capture_output=True, text=True)
          all_files = result.stdout.strip().splitlines()
          files = [f for f in all_files if f.endswith((".py",".js",".ts")) and os.path.isfile(f)]

          if not files:
              print("No files to review")
              exit(0)

          body = "## AI Code Review\n"
          for path in files:
              code = open(path).read()[:6000]
              prompt = "Review this code for bugs and improvements. Be concise.\n\n" + path + ":\n" + code
              url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + api_key
              resp = requests.post(url, json={"contents":[{"parts":[{"text":prompt}]}]})
              data = resp.json()
              print("Gemini response:", json.dumps(data)[:500])
              if "candidates" not in data:
                  print("Error from Gemini:", data)
                  exit(1)
              review = data["candidates"][0]["content"]["parts"][0]["text"]
              body += "\n### " + path + "\n" + review + "\n"

          sha = subprocess.run(["git","rev-parse","HEAD"], capture_output=True, text=True).stdout.strip()
          url2 = "https://api.github.com/repos/" + repo + "/commits/" + sha + "/comments"
          requests.post(url2, json={"body": body}, headers={"Authorization":"Bearer "+token,"Accept":"application/vnd.github+json"}).raise_for_status()
          print("Done!")
          PYEOF
